<style>
:root{--bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
--accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
--gold:#b8860b;--goldL:#d4a84b;--border:#d4c4a8;--border-light:#EDE8E0;
--card:#fffdf7;--verseBg:#f0e8d8;--verseBd:#c4956a;
--sbW:96px;--sbBg:#1e1a14;--sbText:#d4c4a8;
--headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);--r:8px;}
*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{margin:0;background:var(--bg);color:var(--text);
font-family:"Noto Serif TC","Songti TC",Georgia,serif;font-size:20px;line-height:1.8;
-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
/* ---- 側欄 ---- */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;background:var(--sbBg);
color:var(--sbText);z-index:100;display:flex;flex-direction:column;align-items:center;
padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;font-family:"Noto Sans TC",sans-serif;
font-size:11px;letter-spacing:2px;color:var(--gold);text-align:center;line-height:1.5;
background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
padding:14px 4px 12px;margin-bottom:6px;z-index:5;text-decoration:none;cursor:pointer;
transition:color .25s;display:block;border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;margin-top:6px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;
width:100%;text-decoration:none;color:var(--sbText);transition:.2s;border-radius:8px;}
.sb-item:hover{background:rgba(184,134,11,.14);}
.sb-circle{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--accentL);
display:flex;align-items:center;justify-content:center;font-family:"Noto Sans TC",sans-serif;
font-size:15px;font-weight:600;transition:.2s;}
.sb-label{font-size:11.5px;font-family:"Noto Sans TC",sans-serif;text-align:center;opacity:.85;letter-spacing:.3px;}
.sb-item.active .sb-circle{background:var(--gold);color:#fff;border-color:var(--gold);box-shadow:0 0 12px rgba(184,134,11,.6);}
.sb-item.active .sb-label{color:var(--goldL);opacity:1;}
/* ---- 進度膠囊 ---- */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
background:rgba(30,26,20,.92);color:var(--gold);padding:9px 24px;border-radius:30px;
border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;
backdrop-filter:blur(6px);transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}
/* ---- main ---- */
.main{margin-left:var(--sbW);}
.site-hero{background:var(--headGrad);color:#f7f3ec;text-align:center;padding:74px 24px 60px;position:relative;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;font-size:300px;font-weight:900;color:rgba(212,168,75,.04);top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;pointer-events:none;}
.hero-tag{font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:4px;color:var(--goldL);margin-bottom:18px;position:relative;}
.hero-title{font-size:56px;font-weight:900;margin:0 0 16px;color:#f3e6c8;position:relative;letter-spacing:2px;}
.hero-sub{font-size:18px;color:#d8cdb4;position:relative;line-height:1.8;}
.hero-byline{font-size:16px;color:var(--goldL);margin-top:14px;letter-spacing:2px;position:relative;}
.hero-range{font-size:15px;color:#c4b896;margin-top:18px;letter-spacing:2px;position:relative;font-family:"Noto Sans TC",sans-serif;}
.hero-en{font-size:13px;color:#9d9173;margin-top:10px;letter-spacing:1px;position:relative;font-style:italic;}
/* ---- 前言 ---- */
.preface{max-width:860px;margin:46px auto 10px;padding:0 28px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);font-weight:700;margin:0 0 22px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 16px;text-indent:2em;}
/* ---- 總目錄 ---- */
.toc-section{max-width:1100px;margin:40px auto;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;font-weight:700;color:var(--accent);letter-spacing:8px;margin:0 0 10px;}
.toc-desc{text-align:center;font-size:17px;color:var(--text-muted);margin-bottom:30px;font-family:"Noto Sans TC",sans-serif;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.toc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 22px;text-decoration:none;color:inherit;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;gap:16px;align-items:flex-start;}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(91,58,41,.13);border-color:var(--gold);}
.toc-num{flex:none;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;font-family:"Noto Sans TC",sans-serif;}
.toc-body{flex:1;}
.toc-name{font-size:20px;font-weight:700;color:var(--accent);line-height:1.5;margin-bottom:4px;}
.toc-cardsub{font-size:14.5px;color:var(--text-muted);font-family:"Noto Sans TC",sans-serif;line-height:1.6;}
/* ---- 章節 / 橋接 ---- */
.chapter{max-width:980px;margin:24px auto;padding:0 20px;}
.ch-head{background:var(--headGrad);color:#f7f3ec;text-align:center;padding:40px 24px 34px;border-radius:14px 14px 0 0;position:relative;}
.ch-head::after{content:"";display:block;width:60px;height:2px;background:var(--goldL);margin:16px auto 0;}
.ch-pin{font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:3px;color:var(--goldL);margin-bottom:12px;}
.ch-title{font-size:34px;font-weight:900;margin:0;color:#f3e6c8;letter-spacing:1px;}
.ch-csub{font-size:16px;color:#cdbf9e;margin-top:12px;font-family:"Noto Sans TC",sans-serif;letter-spacing:1px;}
.ch-body{background:#fff;padding:30px 30px 26px;border:1px solid var(--border);border-top:0;border-radius:0 0 14px 14px;}
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);border-left:5px solid var(--gold);border-radius:10px;padding:18px 24px;margin:0 0 26px;box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;}
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}
.next-link{display:inline-block;margin:14px 0 4px;font-family:"Noto Sans TC",sans-serif;font-size:17px;color:var(--accent);text-decoration:none;border:1px solid var(--accentL);border-radius:24px;padding:8px 22px;transition:.2s;}
.next-link:hover{background:var(--gold);color:#fff;border-color:var(--gold);}
#backTop{position:fixed;right:22px;bottom:22px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:0;font-size:20px;cursor:pointer;display:none;z-index:120;box-shadow:0 3px 12px rgba(0,0,0,.25);}
.site-footer{background:var(--headGrad);color:#cdbf9e;text-align:center;padding:40px 24px;margin-top:50px;font-size:15px;line-height:1.9;}
.site-footer .ft-title{color:var(--goldL);font-size:18px;letter-spacing:3px;margin-bottom:12px;font-weight:700;}
#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:130;background:var(--sbBg);color:var(--gold);border:0;width:42px;height:42px;border-radius:8px;font-size:20px;cursor:pointer;}
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:.3s;} #sb.open{transform:none;}
  .main{margin-left:0;} #sbToggle{display:block;}
  .hero-title{font-size:38px;} .toc-grid{grid-template-columns:1fr;}
}

  items.forEach(function(it){it.classList.toggle('active',it.getAttribute('href')==='#'+cur);});}
window.addEventListener('scroll',highlight,{passive:true});highlight();
/* 回頂 */
var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){backTop.style.display=window.scrollY>600?'block':'none';},{passive:true});
backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
document.getElementById('sbBrand').addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});
/* 漢堡 */
var tg=document.getElementById('sbToggle');if(tg)tg.addEventListener('click',function(){document.getElementById('sb').classList.toggle('open');});
/* 外層防複製 */
(function(){var blk=function(e){e.preventDefault();return false;};
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){document.addEventListener(ev,blk,true);});
document.addEventListener('keydown',function(e){var k=e.key;
  if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
  if(k==='F12')blk(e);if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}},true);})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-88-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
